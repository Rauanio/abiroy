<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abiroy — Товары</title>
    <!-- Шрифт: SF Pro Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet" />
  </head>
  <body class="flex min-h-screen flex-col bg-[#f3f3f3] text-gray-900">
    {{> header }}

    <main class="flex-1">
      <!-- Хлебные крошки + заголовок -->
      <section class="container-page px-6 pt-12 pb-6 sm:px-10 lg:px-[60px] lg:pt-16 lg:pb-10">
        <nav class="flex flex-wrap items-center gap-1.5 text-[14px] lg:text-[20px]" aria-label="Хлебные крошки">
          <a href="/index.html" class="text-[#999999] transition-colors hover:text-[#0160b1]">Главная</a>
          <svg class="h-4 w-4 text-[#999999]" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path
              d="M6 4l4 4-4 4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <a href="/products.html" class="text-[#999999] transition-colors hover:text-[#0160b1]">Продукты</a>
          <svg class="h-4 w-4 text-[#999999]" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path
              d="M6 4l4 4-4 4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="text-black">Товары</span>
        </nav>
        <h1
          class="mt-10 font-sf text-[44px] font-bold leading-none text-[#0160b1] sm:text-[64px] lg:mt-12 lg:text-[100px]"
        >
          Товары
        </h1>
      </section>

      <!-- Каталог товаров -->
      <section class="bg-white">
        <div class="container-page px-6 py-6 sm:px-10 lg:px-[60px] lg:py-10">
          <!-- Фильтр-категория -->
          <form method="get" action="/goods.html" data-goods-form class="relative inline-block w-full sm:w-auto" data-goods-filter>
            <input type="hidden" name="category" data-goods-value />
            <button
              type="button"
              data-goods-toggle
              aria-haspopup="true"
              aria-expanded="false"
              class="flex w-full items-center justify-between gap-4 rounded-[20px] border-[3px] border-white bg-[#f4f4f4] px-5 py-4 sm:w-auto"
            >
              <span data-goods-label class="font-sf text-[18px] font-medium leading-none text-black lg:text-[20px]"
                >Промышленные установки обратного осмоса</span
              >
              <span class="flex size-9 shrink-0 items-center justify-center">
                <svg
                  data-goods-arrow
                  class="h-2 w-3 text-black transition-transform duration-200"
                  viewBox="0 0 12 8"
                  fill="none"
                  aria-hidden="true"
                >
                  <path
                    d="M1 1.5 6 6.5l5-5"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </button>
            <ul
              data-goods-menu
              class="absolute left-0 top-full z-30 mt-2 hidden w-full min-w-[280px] overflow-hidden rounded-[16px] border border-gray-100 bg-white py-1 shadow-xl"
              role="menu"
            >
              <li>
                <button
                  type="button"
                  data-goods-option
                  class="flex w-full items-center px-5 py-2.5 text-left font-sf text-[16px] text-black transition-colors hover:bg-gray-50"
                  role="menuitem"
                >
                  Промышленные установки обратного осмоса
                </button>
              </li>
              <li>
                <button
                  type="button"
                  data-goods-option
                  class="flex w-full items-center px-5 py-2.5 text-left font-sf text-[16px] text-black transition-colors hover:bg-gray-50"
                  role="menuitem"
                >
                  Фильтрующие материалы
                </button>
              </li>
              <li>
                <button
                  type="button"
                  data-goods-option
                  class="flex w-full items-center px-5 py-2.5 text-left font-sf text-[16px] text-black transition-colors hover:bg-gray-50"
                  role="menuitem"
                >
                  Насосы повышения давления
                </button>
              </li>
              <li>
                <button
                  type="button"
                  data-goods-option
                  class="flex w-full items-center px-5 py-2.5 text-left font-sf text-[16px] text-black transition-colors hover:bg-gray-50"
                  role="menuitem"
                >
                  Умягчители воды
                </button>
              </li>
            </ul>
          </form>

          <!-- Сетка карточек -->
          <div class="mt-8 grid grid-cols-1 gap-[14px] sm:grid-cols-2 lg:mt-10 lg:grid-cols-3">
            {{#each products}}
            <div class="group relative block h-[500px] overflow-hidden bg-[#f5f5f5] sm:h-[540px] lg:h-[568px]">
              <!-- Изображение -->
              <div class="absolute inset-0 flex items-start justify-center pt-[70px]">
                <img
                  src="{{ this.img }}"
                  alt="{{ this.name }}"
                  class="max-h-[330px] w-auto max-w-[80%] object-contain"
                />
              </div>

              <!-- Затухание низа в фон карточки -->
              <div class="pointer-events-none absolute inset-x-0 bottom-0 h-[70%] card-overlay from-transparent"></div>

              <!-- Бейдж + артикул -->
              <div class="absolute inset-x-[30px] top-[30px] z-10 flex items-start justify-between gap-2">
                {{#if this.popular}}
                <span class="bg-[#ffcc00] h-[34px] px-3 py-3 text-[14px] font-semibold leading-none text-black"
                  >Популярное</span
                >
                {{else}}
                <span></span>
                {{/if}}
                <span class="text-right text-[16px] font-medium text-[#999999]">{{ this.code }}</span>
              </div>

              <!-- Описание -->
              <div class="absolute inset-x-[30px] bottom-[30px] z-10 flex flex-col gap-5">
                <a href="/goods-details.html" class="text-[20px] font-semibold leading-tight text-black"
                  >{{ this.name }}</a
                >
                <div class="flex items-center gap-4">
                  <span
                    class="bg-[#64b6ff] h-[28px] px-2.5 flex items-center justify-center text-[12px] font-semibold leading-none text-black"
                    >{{ this.flow }}</span
                  >
                  <span class="text-[16px] text-[#999999]">{{ this.people }}</span>
                </div>
                <div class="text-[24px] font-semibold leading-none text-black">{{ this.price }}</div>
                <button
                  type="button"
                  data-request-open
                  class="inline-flex w-fit h-[43px] items-center justify-center bg-[#0160b1] px-8 py-4 text-[16px] font-semibold text-white transition-colors group-hover:bg-[#014e90] hover:bg-[#014e90]"
                >
                  Получить расчет
                </button>
              </div>
            </div>
            {{/each}}
          </div>

          <!-- Пагинация -->
          <nav class="mt-12 lg:mt-[60px]" aria-label="Пагинация">
            <ul class="flex items-center justify-center gap-2">
              <li class="pointer-events-none flex size-12 items-center justify-center rounded-full bg-white text-[#999999] opacity-40 shadow-sm transition-colors hover:bg-gray-50">
                <a href="#" aria-label="Назад" aria-disabled="true">
                  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 5l-7 7 7 7" />
                  </svg>
                </a>
              </li>
              <li class="flex size-12 items-center justify-center rounded-full bg-[#0160b1] font-sf text-[20px] font-semibold text-white">
                <a href="#" aria-current="page">1</a>
              </li>
              <li class="flex size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50">
                <a href="#">2</a>
              </li>
              <li class="flex size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50">
                <a href="#">3</a>
              </li>
              <li class="hidden size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50 sm:flex">
                <a href="#">4</a>
              </li>
              <li class="hidden size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50 sm:flex">
                <a href="#">5</a>
              </li>
              <li class="hidden size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50 lg:flex">
                <a href="#">6</a>
              </li>
              <li class="hidden size-12 items-center justify-center rounded-full bg-white font-sf text-[20px] font-semibold text-[#333333] transition-colors hover:bg-gray-50 lg:flex">
                <a href="#">7</a>
              </li>
              <li class="flex size-12 items-center justify-center font-sf text-[20px] font-semibold text-[#999999]">
                <span>...</span>
              </li>
              <li class="flex size-12 items-center justify-center rounded-full bg-white text-[#333333] shadow-sm transition-colors hover:bg-gray-50">
                <a href="#" aria-label="Вперёд">
                  <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 5l7 7-7 7" />
                  </svg>
                </a>
              </li>
            </ul>
          </nav>
        </div>
      </section>
    </main>

    {{> footer }}
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
