<!-- Часто задаваемые вопросы (переиспользуемый блок) -->
<section class="bg-[#f4f4f4]">
  <div class="container-page px-6 py-12 sm:px-10 lg:px-[70px] lg:py-[70px]">
    <div class="flex flex-col gap-10 lg:flex-row lg:gap-[50px]">
      <!-- Левая часть -->
      <div class="flex flex-col gap-8 lg:w-[40%] lg:justify-between lg:gap-0">
        <h2 class="max-w-[340px] text-[36px] font-semibold leading-none text-black sm:text-[44px] lg:text-[54px]">
          Часто задаваемые вопросы
        </h2>
        <div class="flex flex-col gap-6">
          <div class="max-w-[544px] text-[18px] leading-snug text-[#666666] lg:text-[20px]">{{ faqText }}</div>
          <a
            href="/contact.html"
            class="inline-flex w-fit items-center justify-center rounded-[12px] bg-[#0160b1] px-[30px] py-[20px] text-[18px] font-semibold text-white transition-colors hover:bg-[#014e90] lg:py-[24px]"
          >Получить расчет</a>
        </div>
      </div>

      <!-- Аккордеон -->
      <div class="flex flex-1 flex-col gap-5">
        {{#each faq}}
          <details name="faq" class="group rounded-[20px] border-[3px] border-white open:bg-white" {{#if this.open}}open{{/if}}>
            <summary class="flex cursor-pointer list-none items-center justify-between gap-4 p-5 [&::-webkit-details-marker]:hidden">
              <span class="text-[20px] font-medium leading-tight text-black lg:text-[24px]">{{ this.q }}</span>
              <img src="/faq-plus.svg" alt="" class="size-9 shrink-0 group-open:hidden" />
              <img src="/faq-minus.svg" alt="" class="hidden size-9 shrink-0 group-open:block" />
            </summary>
            <div class="px-5 pb-5 text-[16px] leading-snug text-[#666666]">{{ this.a }}</div>
          </details>
        {{/each}}
      </div>
    </div>
  </div>
</section>
