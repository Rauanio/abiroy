<!-- Модалка «Получить расчёт» -->
<div data-request-modal class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true" aria-labelledby="request-modal-title">
  <!-- Затемнение -->
  <div data-request-backdrop class="absolute inset-0 bg-black/50 opacity-0 transition-opacity duration-300"></div>

  <!-- Контейнер для центрирования -->
  <div class="absolute inset-0 flex items-center justify-center p-4 sm:p-6">
    <div
      data-request-panel
      class="relative max-h-[92vh] w-full max-w-[560px] scale-95 overflow-y-auto rounded-[20px] bg-white p-6 opacity-0 shadow-[0px_20px_60px_rgba(0,0,0,0.25)] transition-all duration-300 sm:p-8"
    >
      <!-- Шапка -->
      <div class="mb-6 flex items-start justify-between gap-4">
        <div>
          <h2 id="request-modal-title" class="font-sf text-[24px] font-semibold leading-tight text-black sm:text-[28px]">
            Получить расчёт
          </h2>
          <p class="mt-1.5 text-[14px] leading-snug text-[#999]">
            Оставьте контакты — подберём решение и рассчитаем стоимость.
          </p>
        </div>
        <button
          data-request-close
          type="button"
          aria-label="Закрыть"
          class="flex size-10 shrink-0 items-center justify-center rounded-full bg-[#f4f4f4] text-[#333] transition-colors hover:bg-[#e9e9e9]"
        >
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>

      <!-- Форма -->
      <form class="flex flex-col gap-[22px]" data-request-form novalidate>
        <!-- Имя -->
        <label class="flex flex-col gap-3">
          <span class="text-[15px] font-medium tracking-[0.15px] text-[#333]">Имя</span>
          <input
            type="text"
            name="name"
            placeholder="Введите имя"
            required
            class="h-[52px] w-full rounded-[8px] bg-[#f4f4f4] px-4 text-[15px] font-semibold text-black outline-none transition-shadow placeholder:font-medium placeholder:text-[#999] focus:ring-2 focus:ring-[#0160b1]/30"
          />
        </label>

        <!-- Телефон -->
        <label class="flex flex-col gap-3">
          <span class="text-[15px] font-medium tracking-[0.15px] text-[#333]">Телефон</span>
          <div
            class="flex h-[52px] items-center gap-2 rounded-[8px] bg-[#f4f4f4] px-4 transition-shadow focus-within:ring-2 focus-within:ring-[#0160b1]/30"
          >
            <span class="text-[15px] font-medium text-black">+7</span>
            <input
              type="tel"
              name="phone"
              placeholder="700 000 00 00"
              required
              class="h-full flex-1 bg-transparent text-[15px] font-semibold text-black outline-none placeholder:font-medium placeholder:text-[#999]"
            />
          </div>
        </label>

        <!-- Комментарии -->
        <label class="flex flex-col gap-3">
          <span class="text-[15px] font-medium tracking-[0.15px] text-[#333]">Комментарии</span>
          <textarea
            name="comment"
            rows="4"
            placeholder="Укажите источник воды, требуемую производительность и назначение очищенной воды — мы предложим подходящее инженерное решение."
            class="min-h-[120px] w-full resize-none rounded-[8px] bg-[#f4f4f4] p-4 text-[15px] font-medium leading-snug text-black outline-none transition-shadow placeholder:text-[#999] focus:ring-2 focus:ring-[#0160b1]/30"
          ></textarea>
        </label>

        <!-- Согласие -->
        <label class="flex cursor-pointer items-center gap-3">
          <input type="checkbox" name="consent" checked required class="peer sr-only" />
          <span
            class="flex size-6 shrink-0 items-center justify-center rounded-[7px] border border-[#0160b1] bg-white text-white transition-colors peer-checked:bg-[#0160b1]"
          >
            <svg class="h-3 w-3" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2.5 6.5l2.5 2.5 4.5-5" />
            </svg>
          </span>
          <span class="text-[13.5px] font-medium leading-snug text-[#999]">
            Я согласен с
            <a href="/privacy.html" class="text-[#0160b1] underline transition-colors hover:text-[#014e90]">Политикой Конфиденциальности</a>
          </span>
        </label>

        <!-- Кнопки -->
        <div class="flex flex-col gap-3 sm:flex-row sm:gap-[23px]">
          <button
            type="submit"
            class="flex flex-1 h-[66px] items-center justify-center rounded-[12px] bg-[#0160b1] px-[30px] py-[18px] text-[18px] font-semibold text-white shadow-[0px_4px_12.7px_rgba(0,0,0,0.12)] transition-colors hover:bg-[#014e90]"
          >
            Получить консультацию
          </button>
          <button
            type="button"
            class="flex flex-1 h-[66px] items-center justify-center rounded-[12px] border border-[#e5e5e5] bg-white px-[30px] py-[18px] text-[18px] font-semibold text-black shadow-[0px_4px_12.7px_rgba(0,0,0,0.12)] transition-colors hover:bg-gray-50"
          >
            Подобрать технологию
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
